<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" href="https://www.freeiconspng.com/uploads/dashboard-icon-3.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Central de Dados</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="acesso.css" />
  <style>
    :root {
        --primary-color: #ff9a1f;
        --primary-dark: #e68a1c;
        --bg-color: #f3f4f6;
        --text-color: #1f2937;
        --gradient-bg: linear-gradient(135deg, #ff9a1f, #ff7a00);
    }
    
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        background: var(--bg-color);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .auth-page {
        display: flex;
        width: 100%;
        height: 100vh;
        background: #fff;
        overflow: hidden;
    }

    .auth-left {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 4rem 2rem;
        position: relative;
        z-index: 2;
        background: #fff;
    }

    .auth-right {
        flex: 1.5;
        background: url('imagem.jpg') center/cover no-repeat;
        position: relative;
        clip-path: polygon(10% 0, 100% 0, 100% 100%, 0% 100%);
    }
    
    .auth-right::before {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.1), transparent);
    }

    .brand {
        margin-bottom: 2.5rem;
        text-align: center;
    }

    .brand-badge {
        font-size: 3.5rem;
        color: var(--primary-color);
        margin-bottom: 0.5rem;
        filter: drop-shadow(0 4px 10px rgba(255, 154, 31, 0.2));
    }

    .brand-text h2 {
        font-size: 2rem;
        color: var(--text-color);
        font-weight: 700;
        letter-spacing: -0.5px;
    }

    .brand-text p {
        color: #6b7280;
        font-size: 1rem;
    }

    .login-card {
        width: 100%;
        max-width: 380px;
    }

    form h1 {
        font-size: 1.8rem;
        margin-bottom: 2rem;
        color: var(--text-color);
        font-weight: 600;
    }

    .input-box {
        position: relative;
        margin-bottom: 1.5rem;
    }

    .input-box input {
        width: 100%;
        padding: 1rem 1rem 1rem 3rem;
        border: 2px solid #f3f4f6;
        background: #f9fafb;
        border-radius: 12px;
        outline: none;
        font-size: 1rem;
        transition: 0.3s;
        color: var(--text-color);
    }

    .input-box input::placeholder {
        color: #9ca3af;
    }

    .input-box input:focus {
        border-color: var(--primary-color);
        background: #fff;
        box-shadow: 0 0 0 4px rgba(255, 154, 31, 0.1);
    }

    .input-box i {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        font-size: 1.3rem;
        color: #9ca3af;
        transition: 0.3s;
    }
    
    .input-box input:focus ~ i {
        color: var(--primary-color);
    }

    .remember-forgot {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
        font-size: 0.9rem;
        color: #6b7280;
    }

    .remember-forgot a {
        color: var(--primary-color);
        text-decoration: none;
        font-weight: 500;
        transition: 0.2s;
    }
    
    .remember-forgot a:hover {
        text-decoration: underline;
    }

    .Login {
        width: 100%;
        padding: 1rem;
        background: var(--primary-color);
        color: #fff;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 4px 12px rgba(255, 154, 31, 0.2);
    }

    .Login:hover {
        background: var(--primary-dark);
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(255, 154, 31, 0.3);
    }
    
    .Login:active {
        transform: translateY(0);
    }

    .footer-note {
        margin-top: 3rem;
        font-size: 0.8rem;
        color: #9ca3af;
    }

    @media (max-width: 768px) {
        .auth-right {
            display: none;
        }
        .auth-left {
            padding: 2rem;
        }
    }
  </style>
</head>

<body>
  <main class="auth-page">

    <!-- LADO ESQUERDO -->
    <section class="auth-left">

      <div class="brand">
        <div class="brand-badge"><i class='bx bxs-bulb'></i></div>
        <div class="brand-text">
          <h2>Central de Dados</h2>
          <p>Sistema de Dashboards</p>
        </div>
      </div>

      <div class="login-card container">
        <form id="login-form">
          <h1>Login</h1>

          <div class="input-box">
            <input id="usuario" type="text" placeholder="Usuário" required />
            <i class="bx bxs-user"></i>
          </div>

          <div class="input-box">
            <input id="senha" type="password" placeholder="Senha" required />
            <i class="bx bxs-lock-alt"></i>
          </div>

          <div class="remember-forgot">
            <label><input type="checkbox" /> Lembrar senha</label>
            <a href="#">Esqueci a senha</a>
          </div>

          <button type="submit" class="Login">Entrar</button>
        </form>
      </div>

      <p class="footer-note">© 2026 • Iluminação & Dados</p>

    </section>

    <!-- LADO DIREITO -->
    <section class="auth-right"></section>

  </main>

<script>
const urlBackend = "https://dashboard-grupo.onrender.com";

// Se já estiver logado, pula login
window.onload = () => {
  const nivel = localStorage.getItem("nivel_permissao");
  if (nivel) {
    window.location.replace("segunda tela.html");
  }
};

document.getElementById("login-form").addEventListener("submit", async function (e) {
  e.preventDefault();

  const usuario = document.getElementById("usuario").value.trim();
  const senha = document.getElementById("senha").value.trim();

  try {
    const resposta = await fetch(`${urlBackend}/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ usuario, senha })
    });

    const dados = await resposta.json();

    if (resposta.ok && dados.success) {
      localStorage.setItem("usuario", usuario);
      localStorage.setItem("nivel_permissao", dados.nivel_permissao);

      window.location.replace("segunda tela.html");
    } else {
      alert(dados.mensagem || "Usuário ou senha incorretos.");
    }
  } catch {
    alert("Erro ao conectar com o servidor.");
  }
});
</script>

</body>
</html>
